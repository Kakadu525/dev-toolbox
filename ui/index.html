<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Dev Toolbox</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <div class="sidebar-item active" data-tool="base64">Base64</div>
      <div class="sidebar-item" data-tool="hash">Hash Calculator</div>
      <div class="sidebar-item" data-tool="uuid">UUID Generator</div>
      <div class="sidebar-item" data-tool="json">JSON Formatter</div>
	  <div class="sidebar-item" data-tool="xml">XML Formatter</div>
	  <div class="sidebar-item" data-tool="yaml">YAML Formatter</div>
      <!-- сюда будут добавляться новые инструменты -->
    </nav>
    <main class="content">
      <section id="tool-base64" class="tool-panel active">
        <h2>Base64</h2>
        <textarea id="base64-input" placeholder="Введите текст"></textarea>
        <div class="actions">
          <button onclick="Base64Tool.encode()">Encode</button>
          <button onclick="Base64Tool.decode()">Decode</button>
        </div>
        <textarea id="base64-output" placeholder="Результат" readonly></textarea>
      </section>

      <section id="tool-hash" class="tool-panel">
        <h2>Hash Calculator</h2>
        <textarea id="hash-input" placeholder="Введите текст"></textarea>
        <div class="actions">
          <button onclick="HashTool.md5()">MD5</button>
          <button onclick="HashTool.sha256()">SHA256</button>
        </div>
        <textarea id="hash-output" placeholder="Результат" readonly></textarea>
      </section>

      <section id="tool-uuid" class="tool-panel">
        <h2>UUID Generator</h2>
        <div class="actions">
          <button onclick="UuidTool.generate()">Сгенерировать</button>
        </div>
        <textarea id="uuid-output" placeholder="Результат" readonly></textarea>
      </section>

      <section id="tool-json" class="tool-panel">
        <h2>JSON Formatter</h2>
        <textarea id="json-input" placeholder='Например: {"name":"Иван","age":30}'></textarea>
        <div class="actions">
          <button onclick="JsonTool.pretty()">Pretty Print</button>
          <button onclick="JsonTool.minify()">Minify</button>
        </div>
        <textarea id="json-output" placeholder="Результат" readonly></textarea>
      </section>
	  
	  <section id="tool-xml" class="tool-panel">
        <h2>XML Formatter</h2>
        <textarea id="xml-input" placeholder="Например: <root><name>Иван</name></root>"></textarea>
        <div class="actions">
          <button onclick="XmlTool.pretty()">Pretty Print</button>
          <button onclick="XmlTool.minify()">Minify</button>
        </div>
        <textarea id="xml-output" placeholder="Результат" readonly></textarea>
      </section>
	  
	  <section id="tool-yaml" class="tool-panel">
        <h2>YAML Formatter</h2>
        <textarea id="yaml-input" placeholder="Например: name: Иван&#10;age: 30"></textarea>
        <div class="actions">
          <button onclick="YamlTool.format()">Format</button>
        </div>
        <textarea id="yaml-output" placeholder="Результат" readonly></textarea>
      </section>
    </main>
  </div>

  <script src="bridge.js"></script>
  <script src="tools/base64.js"></script>
  <script src="tools/hash.js"></script>
  <script src="tools/uuid.js"></script>
  <script src="tools/json.js"></script>
  <script src="tools/xml.js"></script>
  <script src="tools/yaml.js"></script>
  <script src="app.js"></script>
</body>
</html>
